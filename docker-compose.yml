version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: thai_alpr_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thai_alpr
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alpr_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thai_alpr_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: thai_alpr
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: change-this-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alpr_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]  # Enable GPU for YOLO/OCR

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thai_alpr_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - alpr_network

  # Optional: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: thai_alpr_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - alpr_network

volumes:
  postgres_data:
    driver: local

networks:
  alpr_network:
    driver: bridge
